name: Syntax and Import Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check all Python files
        run: |
          python -m py_compile database/db.py
          python -m py_compile agent_platform/utils.py
          python -m py_compile agent_platform/server_manager.py
          python -m py_compile agent_platform/twilio_provisioner.py
          python -m py_compile agent_platform/routes/agents.py
          python -m py_compile webhook_server.py
          python -m py_compile post_call_pipeline.py
          python -m py_compile agent_wrapper.py
          python -m py_compile main.py
      - name: Run tests
        run: pytest tests/ -v
